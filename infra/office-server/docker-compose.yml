services:
  hbbs:
    image: ${RUSTDESK_SERVER_IMAGE:-rustdesk/rustdesk-server:latest}
    container_name: antreva-remote-hbbs
    command: hbbs -r ${ANTREVA_REMOTE_HOST}:21117
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
      - "21118:21118"
    volumes:
      - ./data:/root
    depends_on:
      - hbbr
    restart: unless-stopped

  hbbr:
    image: ${RUSTDESK_SERVER_IMAGE:-rustdesk/rustdesk-server:latest}
    container_name: antreva-remote-hbbr
    command: hbbr
    ports:
      - "21117:21117"
      - "21119:21119"
    volumes:
      - ./data:/root
    restart: unless-stopped
